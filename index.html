<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Paychex Flex | Payroll Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', 'Helvetica', sans-serif; }
    body { background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .app-container { width: 100%; max-width: 1400px; background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); overflow: hidden; }
    .screen { transition: 0.2s; }
    .hidden { display: none; }
    /* Login */
    .login-card { background: white; max-width: 480px; margin: 60px auto; padding: 36px 32px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
    .paychex-logo { font-size: 32px; font-weight: 700; color: #2F85CB; margin-bottom: 8px; letter-spacing: -0.5px; }
    .paychex-logo-sub { font-size: 11px; color: #5a6e7c; margin-top: -5px; margin-bottom: 20px; }
    .login-title { font-size: 22px; color: #1e2a3a; margin-bottom: 28px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 6px; color: #1e293b; }
    .input-group input, .input-group select { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
    .btn-primary { background: #2F85CB; color: white; border: none; padding: 12px; font-size: 15px; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
    .btn-primary:hover { background: #1f6aa8; }
    .btn-secondary { background: white; border: 1px solid #cbd5e1; color: #1e293b; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 500; }
    .flex-links { display: flex; justify-content: space-between; margin-top: 18px; font-size: 13px; }
    .flex-links a { color: #2F85CB; text-decoration: none; cursor: pointer; }
    /* Dashboard Header */
    .dashboard-header { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo-small { font-size: 22px; font-weight: 700; color: #2F85CB; }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links span { cursor: pointer; font-weight: 500; color: #1e293b; padding: 8px 0; font-size: 14px; }
    .nav-links span.active { color: #2F85CB; border-bottom: 2px solid #2F85CB; }
    .dashboard-content { padding: 28px; background: #f8fafc; min-height: 70vh; }
    .widget { background: white; border-radius: 16px; padding: 22px; border: 1px solid #eef2f6; margin-bottom: 24px; }
    .widget h3 { font-size: 18px; margin-bottom: 16px; color: #0f172a; border-left: 3px solid #2F85CB; padding-left: 12px; }
    .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 180px; }
    .form-group label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; display: block; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
    .employee-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .employee-table th, .employee-table td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
    .employee-table th { background: #f8fafc; font-weight: 600; }
    .badge-pending { background: #fef3c7; color: #b45309; padding: 2px 10px; border-radius: 20px; font-size: 11px; }
    .badge-approved { background: #e0f2e9; color: #1f7840; padding: 2px 10px; border-radius: 20px; font-size: 11px; }
    .small-btn { background: none; border: 1px solid #cbd5e1; padding: 6px 14px; border-radius: 30px; font-size: 12px; cursor: pointer; }
    .admin-panel { background: #fffdf7; border-left: 4px solid #f5a623; padding: 20px; border-radius: 16px; margin-bottom: 24px; }
    /* PDF Paystub - Authentic Paychex */
    .paystub-pdf { background: white; padding: 32px 36px; max-width: 980px; font-family: 'Arial', 'Helvetica', sans-serif; color: #000; }
    .pdf-header { display: flex; justify-content: space-between; border-bottom: 1px solid #cccccc; padding-bottom: 20px; margin-bottom: 24px; }
    .employer-block h2 { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
    .employer-block p, .employee-details p { margin: 4px 0; font-size: 11px; color: #222; }
    .employee-details { text-align: right; font-size: 11px; }
    .earnings-table, .deductions-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 11px; }
    .earnings-table th, .deductions-table th { text-align: left; background: #f9f9f9; padding: 8px 6px; border-bottom: 1px solid #ddd; font-weight: 600; }
    .earnings-table td, .deductions-table td { padding: 6px; border-bottom: 1px solid #efefef; }
    .numeric { text-align: right; }
    .net-pay-section { text-align: right; background: #F5F5F5; padding: 14px 24px; border: 1px solid #e0e0e0; font-weight: bold; font-size: 15px; margin-top: 20px; }
    .ytd-note { margin-top: 18px; font-size: 10px; border-top: 1px solid #ccc; padding-top: 12px; }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen">
    <div class="login-card">
      <div class="paychex-logo">Paychex</div>
      <div class="paychex-logo-sub">Payroll | HR | Benefits</div>
      <div class="login-title">Employee & Admin Login</div>
      <div class="input-group"><label>Username</label><input type="text" id="loginUsername" placeholder="Username"></div>
      <div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Password"></div>
      <button class="btn-primary" id="doLoginBtn">Sign In</button>
      <div class="flex-links"><a id="gotoRegisterLink">Create Account</a><a>Forgot Username?</a><a>Forgot Password?</a></div>
    </div>
  </div>

  <!-- REGISTRATION - Full Employee Onboarding -->
  <div id="registerScreen" class="screen hidden">
    <div class="login-card" style="max-width: 800px; margin: 30px auto;">
      <div class="paychex-logo">Paychex Flex</div>
      <div class="login-title">Employee Self-Registration</div>
      <form id="registrationForm">
        <div class="form-row"><div class="form-group"><label>First Name *</label><input id="regFirstName" required></div><div class="form-group"><label>Last Name *</label><input id="regLastName" required></div></div>
        <div class="form-row"><div class="form-group"><label>Date of Birth *</label><input type="date" id="regDOB" required></div><div class="form-group"><label>SSN *</label><input id="regSSN" placeholder="XXX-XX-XXXX" required></div></div>
        <div class="form-row"><div class="form-group"><label>Email *</label><input type="email" id="regEmail" required></div><div class="form-group"><label>Phone *</label><input id="regPhone" required></div></div>
        <div class="form-row"><div class="form-group"><label>Address *</label><input id="regAddress" required></div><div class="form-group"><label>City *</label><input id="regCity" required></div></div>
        <div class="form-row"><div class="form-group"><label>State *</label><input id="regState" placeholder="FL" required></div><div class="form-group"><label>ZIP *</label><input id="regZip" required></div></div>
        <div class="form-row"><div class="form-group"><label>Routing Number *</label><input id="regRouting" required></div><div class="form-group"><label>Account Number *</label><input id="regAccount" required></div></div>
        <div class="form-row"><div class="form-group"><label>Account Type</label><select id="regAccountType"><option>Checking</option><option>Savings</option></select></div><div class="form-group"><label>Filing Status (W-4)</label><select id="regFilingStatus"><option>Single</option><option>Married</option><option>Head of Household</option></select></div></div>
        <div class="form-row"><div class="form-group"><label>Dependents</label><input type="number" id="regDependents" value="0"></div><div class="form-group"><label>Extra Withholding ($)</label><input type="number" id="regExtraWithholding" value="0"></div></div>
        <div class="form-row"><div class="form-group"><label>Username *</label><input id="regUsername" required></div><div class="form-group"><label>Password *</label><input type="password" id="regPassword" required></div></div>
        <div class="form-row"><div class="form-group"><label>Emergency Contact Name</label><input id="regEmergencyName"></div><div class="form-group"><label>Emergency Phone</label><input id="regEmergencyPhone"></div></div>
        <button type="button" class="btn-primary" id="doRegisterBtn">Submit for Admin Approval</button>
      </form>
      <div class="flex-links"><a id="backToLoginLink">← Back to Login</a></div>
    </div>
  </div>

  <!-- MAIN DASHBOARD -->
  <div id="dashboardScreen" class="screen hidden">
    <div class="dashboard-header">
      <div class="logo-small">Paychex</div>
      <div class="nav-links" id="navLinks"><span data-tab="dashboard" class="active">Dashboard</span><span data-tab="payroll">Payroll</span><span data-tab="employees">Employees</span><span data-tab="time">Time</span><span data-tab="reports">Reports</span><span data-tab="settings">Settings</span></div>
      <div><span id="userNameDisplay"></span> <button class="btn-secondary" id="logoutBtn" style="margin-left:15px;">Logout</button></div>
    </div>
    <div class="dashboard-content" id="mainContent"></div>
  </div>
</div>

<script>
  // COMPANY DATA
  const COMPANY = { name: "U.S. TITLE & ESCROW INC.", address: "2715 E Oakland Park Blvd Ste 300, Fort Lauderdale, FL 33306", fein: "59-3300551" };
  
  let users = [];
  let currentUser = null;

  function persist() { localStorage.setItem("paychex_real_db", JSON.stringify(users)); }
  
  function loadData() {
    const stored = localStorage.getItem("paychex_real_db");
    if(stored) { try { users = JSON.parse(stored); } catch(e){} }
    if(!users.length){
      users.push({ id: "admin_1", username: "admin", password: "admin123$", role: "admin", status: "approved", personal: { firstName: "System", lastName: "Admin", email: "admin@ustitle.com" }, hourlyRate: 0, payHistory: [] });
      persist();
    }
    users.forEach(u => { if(u.role === "employee" && !u.payHistory) u.payHistory = []; if(!u.documents) u.documents = []; });
  }

  // Generate authentic paystub
  function generatePaystub(employee, payDateObj = null) {
    const rate = employee.hourlyRate || 27.50;
    const hours = 80;
    const gross = hours * rate;
    let fedTax = gross * (employee.tax?.filingStatus === "Married" ? 0.10 : 0.12);
    fedTax = Math.max(0, fedTax - ((employee.tax?.dependents || 0) * 15));
    const stateTax = gross * 0.039;
    const ss = gross * 0.062;
    const medicare = gross * 0.0145;
    const health = 47.50;
    const extra = employee.tax?.extraWithholding || 0;
    const totalDeductions = fedTax + stateTax + ss + medicare + health + extra;
    const netPay = gross - totalDeductions;
    let payDate = payDateObj ? new Date(payDateObj) : new Date();
    if(!payDateObj) payDate.setDate(payDate.getDate() - 14);
    const periodEnd = new Date(payDate);
    const periodStart = new Date(payDate); periodStart.setDate(periodStart.getDate() - 14);
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
    const ytdGross = (18500 + gross).toFixed(2);
    return { payDate: fmt(payDate), periodStart: fmt(periodStart), periodEnd: fmt(periodEnd), gross: gross.toFixed(2), regularHours: hours, rate: rate, regularPay: gross.toFixed(2), federalTax: fedTax.toFixed(2), stateTax: stateTax.toFixed(2), socialSecurity: ss.toFixed(2), medicare: medicare.toFixed(2), healthInsurance: health.toFixed(2), extraWithholding: extra, totalDeductions: totalDeductions.toFixed(2), netPay: netPay.toFixed(2), ytdGross: ytdGross, ytdDeductions: (4250 + totalDeductions).toFixed(2), ytdNet: (ytdGross - (4250 + totalDeductions)).toFixed(2) };
  }

  function initPayHistory(emp) {
    if(!emp.payHistory || emp.payHistory.length === 0){
      const d1 = new Date(); d1.setDate(d1.getDate()-45);
      const d2 = new Date(); d2.setDate(d2.getDate()-20);
      emp.payHistory = [generatePaystub(emp, d1), generatePaystub(emp, d2)];
      persist();
    }
  }

  function registerEmployee(data){
    if(users.find(u=>u.username === data.username)) return false;
    users.push({ id: "emp_"+Date.now(), username: data.username, password: data.password, role: "employee", status: "pending", personal: { firstName: data.firstName, lastName: data.lastName, dob: data.dob, ssn: data.ssn, email: data.email, phone: data.phone, address: data.address, city: data.city, state: data.state, zip: data.zip, emergencyName: data.emergencyName, emergencyPhone: data.emergencyPhone }, tax: { filingStatus: data.filingStatus, dependents: parseInt(data.dependents)||0, extraWithholding: parseFloat(data.extraWithholding)||0 }, banking: { routing: data.routing, account: data.account, accountType: data.accountType }, hourlyRate: 26.50, payHistory: [], documents: [] });
    persist();
    return true;
  }

  function approveEmployee(id, rate){
    const emp = users.find(u=>u.id === id);
    if(emp && emp.status === "pending"){ emp.status = "approved"; emp.hourlyRate = parseFloat(rate); initPayHistory(emp); persist(); return true; }
    return false;
  }

  // Admin: Edit employee paystub (manual adjustment)
  function adminEditPaystub(empId, stubIndex, newGross){
    const emp = users.find(u=>u.id === empId);
    if(emp && emp.payHistory[stubIndex]){
      emp.payHistory[stubIndex].gross = parseFloat(newGross).toFixed(2);
      // recalc deductions
      let g = parseFloat(newGross);
      let fed = g * (emp.tax?.filingStatus === "Married" ? 0.10 : 0.12);
      fed = Math.max(0, fed - ((emp.tax?.dependents || 0)*15));
      let totalDed = fed + (g*0.039) + (g*0.062) + (g*0.0145) + 47.50 + (emp.tax?.extraWithholding||0);
      emp.payHistory[stubIndex].netPay = (g - totalDed).toFixed(2);
      emp.payHistory[stubIndex].totalDeductions = totalDed.toFixed(2);
      emp.payHistory[stubIndex].federalTax = fed.toFixed(2);
      persist();
      return true;
    }
    return false;
  }

  // RENDER ENGINE
  function renderDashboard(){
    if(!currentUser) return;
    const container = document.getElementById("mainContent");
    const activeTab = document.querySelector("#navLinks .active")?.getAttribute("data-tab") || "dashboard";
    if(currentUser.role === "admin") renderAdmin(container, activeTab);
    else if(currentUser.status === "pending") container.innerHTML = `<div class="widget"><h3>Account Pending Approval</h3><p>Your registration has been submitted. Administrator will approve your account shortly.</p></div>`;
    else renderEmployee(container, activeTab);
  }

  function renderAdmin(container, tab){
    if(tab === "dashboard"){
      const pending = users.filter(u=>u.role==="employee" && u.status==="pending");
      const approved = users.filter(u=>u.role==="employee" && u.status==="approved");
      container.innerHTML = `<div class="admin-panel"><h3>🏢 Paychex Admin Console | ${COMPANY.name}</h3><p>FEIN: ${COMPANY.fein} | Next Payroll: 04/15/2026</p></div>
      <div class="widget"><h3>Pending Approvals (${pending.length})</h3><div id="pendingListAdmin"></div></div>
      <div class="widget"><h3>Active Employees (${approved.length})</h3><div id="activeListAdmin"></div></div>`;
      const pendingDiv = document.getElementById("pendingListAdmin");
      pendingDiv.innerHTML = pending.map(emp => `<div style="padding:10px; border-bottom:1px solid #eee;"><strong>${emp.personal.firstName} ${emp.personal.lastName}</strong> (${emp.personal.email})<br><input type="number" id="rate_${emp.id}" placeholder="Hourly Rate" value="28.50" style="width:120px; margin-top:8px;"> <button class="small-btn approveBtn" data-id="${emp.id}">Approve & Activate</button></div>`).join("");
      document.querySelectorAll(".approveBtn").forEach(btn => {
        btn.addEventListener("click", (e) => { const id = btn.getAttribute("data-id"); const rate = document.getElementById(`rate_${id}`).value; approveEmployee(id, rate); renderDashboard(); });
      });
      const activeDiv = document.getElementById("activeListAdmin");
      activeDiv.innerHTML = approved.map(emp => `<div style="padding:8px; border-bottom:1px solid #eee;">${emp.personal.firstName} ${emp.personal.lastName} — $${emp.hourlyRate}/hr <span class="badge-approved">Active</span> <button class="small-btn viewEmpStubs" data-id="${emp.id}">View/Edit Paystubs</button></div>`).join("");
      document.querySelectorAll(".viewEmpStubs").forEach(btn => {
        btn.addEventListener("click", () => { showEmployeePaystubEditor(btn.getAttribute("data-id")); });
      });
    } 
    else if(tab === "payroll"){
      container.innerHTML = `<div class="widget"><h3>Run Payroll</h3><div class="form-row"><div class="form-group"><label>Pay Period Start</label><input type="date" id="ppStart"></div><div class="form-group"><label>Pay Period End</label><input type="date" id="ppEnd"></div></div><button class="btn-primary" id="previewPayrollBtn">Preview Payroll</button><div id="payrollPreview"></div></div>`;
      document.getElementById("previewPayrollBtn")?.addEventListener("click", () => {
        const active = users.filter(u=>u.role==="employee" && u.status==="approved");
        let html = `<table class="employee-table"><tr><th>Employee</th><th>Hours</th><th>Rate</th><th>Gross</th><th>Action</th></tr>`;
        active.forEach(emp => { html += `<tr><td>${emp.personal.firstName} ${emp.personal.lastName}</td><td><input type="number" id="hrs_${emp.id}" value="80" style="width:70px;"></td><td>$${emp.hourlyRate}</td><td id="gross_${emp.id}">$${(80*emp.hourlyRate).toFixed(2)}</td><td><button class="small-btn updateGrossBtn" data-id="${emp.id}">Update</button></td></tr>`; });
        html += `</table><button class="btn-primary" id="submitPayrollFinal">Submit Payroll & Generate Paystubs</button>`;
        document.getElementById("payrollPreview").innerHTML = html;
        document.querySelectorAll(".updateGrossBtn").forEach(btn => {
          btn.addEventListener("click", (e) => {
            const id = btn.getAttribute("data-id");
            const hrs = document.getElementById(`hrs_${id}`).value;
            const emp = users.find(u=>u.id === id);
            const gross = hrs * emp.hourlyRate;
            document.getElementById(`gross_${id}`).innerText = `$${gross.toFixed(2)}`;
          });
        });
        document.getElementById("submitPayrollFinal")?.addEventListener("click", () => {
          users.forEach(u => { if(u.role==="employee" && u.status==="approved"){ const newStub = generatePaystub(u, new Date()); u.payHistory.unshift(newStub); } });
          persist();
          alert("Payroll submitted! New paystubs generated.");
          renderDashboard();
        });
      });
    }
    else if(tab === "employees"){
      const allEmps = users.filter(u=>u.role==="employee");
      container.innerHTML = `<div class="widget"><h3>Employee Directory</h3><table class="employee-table"><tr><th>Name</th><th>Email</th><th>Hourly Rate</th><th>Status</th><th>Actions</th></tr>${allEmps.map(emp => `<tr><td>${emp.personal.firstName} ${emp.personal.lastName}</td><td>${emp.personal.email}</td><td><input type="number" id="rateEdit_${emp.id}" value="${emp.hourlyRate}" style="width:80px;"></td><td>${emp.status==="approved"?"Active":"Pending"}</td><td><button class="small-btn saveRateBtn" data-id="${emp.id}">Save Rate</button> <button class="small-btn editStubsBtn" data-id="${emp.id}">Edit Paystubs</button></td></tr>`).join("")}</table></div>`;
      document.querySelectorAll(".saveRateBtn").forEach(btn => {
        btn.addEventListener("click", () => { const id = btn.getAttribute("data-id"); const newRate = document.getElementById(`rateEdit_${id}`).value; const emp = users.find(u=>u.id===id); if(emp){ emp.hourlyRate = parseFloat(newRate); persist(); alert("Rate updated"); renderDashboard(); } });
      });
      document.querySelectorAll(".editStubsBtn").forEach(btn => { btn.addEventListener("click", () => showEmployeePaystubEditor(btn.getAttribute("data-id"))); });
    }
    else if(tab === "settings"){
      container.innerHTML = `<div class="widget"><h3>Company Settings</h3><div class="form-group"><label>Company Name</label><input id="coName" value="${COMPANY.name}"></div><div class="form-group"><label>FEIN</label><input id="coFein" value="${COMPANY.fein}"></div><div class="form-group"><label>Address</label><input id="coAddr" value="${COMPANY.address}"></div><button class="btn-primary" id="saveCompanyBtn">Save Changes</button><hr><h3>Payroll Schedule</h3><select><option>Biweekly (Current)</option><option>Weekly</option><option>Semi-monthly</option></select></div>`;
      document.getElementById("saveCompanyBtn")?.addEventListener("click", () => { alert("Company settings updated (demo)."); });
    }
    else { container.innerHTML = `<div class="widget"><h3>Reports</h3><button class="small-btn">Export Payroll Summary CSV</button><button class="small-btn">Tax Liability Report</button></div>`; }
  }

  function showEmployeePaystubEditor(empId){
    const emp = users.find(u=>u.id === empId);
    if(!emp || !emp.payHistory) return;
    let html = `<div class="widget"><h3>Edit Paystubs for ${emp.personal.firstName} ${emp.personal.lastName}</h3>`;
    emp.payHistory.forEach((stub, idx) => {
      html += `<div style="border:1px solid #ddd; padding:12px; margin-bottom:12px;"><strong>Pay Date: ${stub.payDate}</strong><br>Gross: $<input type="number" id="grossEdit_${idx}" value="${stub.gross}" step="10"> <button class="small-btn updateStubBtn" data-idx="${idx}" data-emp="${empId}">Update Gross & Recalculate</button><br>Net Pay: $${stub.netPay} | Deductions: $${stub.totalDeductions}</div>`;
    });
    html += `<button class="btn-secondary" id="closeEditor">Close</button></div>`;
    const container = document.getElementById("mainContent");
    container.innerHTML = html;
    document.querySelectorAll(".updateStubBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.getAttribute("data-idx"));
        const newGross = document.getElementById(`grossEdit_${idx}`).value;
        adminEditPaystub(empId, idx, newGross);
        showEmployeePaystubEditor(empId);
      });
    });
    document.getElementById("closeEditor")?.addEventListener("click", () => renderDashboard());
  }

  function renderEmployee(container, tab){
    const emp = currentUser;
    if(tab === "dashboard"){
      const last = emp.payHistory?.[emp.payHistory.length-1];
      container.innerHTML = `<div class="widget"><h3>Welcome, ${emp.personal.firstName}</h3><p>${COMPANY.name}</p></div>
      <div class="widget"><h3>Recent Pay</h3><p>Net Pay: <strong>$${last?.netPay || '0.00'}</strong><br>Pay Date: ${last?.payDate || 'N/A'}</p><button class="small-btn" id="viewMyStubs">View Pay Stubs</button></div>
      <div class="widget"><h3>Time Summary</h3><p>PTO Balance: 34 hours</p><button class="small-btn">Request Time Off</button></div>`;
      document.getElementById("viewMyStubs")?.addEventListener("click",()=>{ document.querySelector("#navLinks span[data-tab='payroll']").click(); });
    }
    else if(tab === "payroll"){
      let html = `<div class="widget"><h3>My Pay Stubs</h3>`;
      emp.payHistory.forEach((stub, idx) => {
        html += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #e2e8f0;"><span><strong>${stub.payDate}</strong> — Net: $${stub.netPay}</span><button class="small-btn downloadPdf" data-idx="${idx}">Download PDF</button></div>`;
      });
      html += `<hr><h3>Tax Documents</h3><button class="small-btn">W-2 (2025)</button></div>`;
      container.innerHTML = html;
      document.querySelectorAll(".downloadPdf").forEach(btn => {
        btn.addEventListener("click", () => { const idx = btn.getAttribute("data-idx"); generatePDF(emp, parseInt(idx)); });
      });
    }
    else { container.innerHTML = `<div class="widget"><h3>My Profile</h3><p>${emp.personal.firstName} ${emp.personal.lastName}<br>${emp.personal.email}<br>${emp.personal.address}, ${emp.personal.city}</p><button class="small-btn">Edit Profile</button></div>`; }
  }

  function generatePDF(employee, idx){
    const stub = employee.payHistory[idx];
    const pdfDiv = document.createElement('div');
    pdfDiv.className = 'paystub-pdf';
    pdfDiv.innerHTML = `<div class="pdf-header"><div class="employer-block"><h2>${COMPANY.name}</h2><p>${COMPANY.address}</p><p>FEIN: ${COMPANY.fein}</p><p style="color:#2F85CB;">Payroll by Paychex</p></div><div class="employee-details"><p><strong>${employee.personal.firstName} ${employee.personal.lastName}</strong></p><p>Pay Date: ${stub.payDate}</p><p>Pay Period: ${stub.periodStart} – ${stub.periodEnd}</p></div></div>
    <table class="earnings-table"><thead><tr><th>Earnings</th><th>Hours</th><th>Rate</th><th class="numeric">Current</th><th class="numeric">YTD</th></tr></thead><tbody><tr><td>Regular Pay</td><td>${stub.regularHours}</td><td>$${stub.rate.toFixed(2)}</td><td class="numeric">$${stub.regularPay}</td><td class="numeric">-</td></tr><tr style="font-weight:600;"><td>Gross Pay</td><td></td><td></td><td class="numeric">$${stub.gross}</td><td class="numeric">$${stub.ytdGross}</td></tr></tbody></table>
    <table class="deductions-table"><thead><tr><th>Deductions</th><th class="numeric">Current</th><th class="numeric">YTD</th></tr></thead><tbody>
    <tr><td>Federal Income Tax</td><td class="numeric">$${stub.federalTax}</td><td class="numeric">-</td></tr>
    <tr><td>State Tax</td><td class="numeric">$${stub.stateTax}</td><td class="numeric">-</td></tr>
    <tr><td>Social Security</td><td class="numeric">$${stub.socialSecurity}</td><td class="numeric">-</td></tr>
    <tr><td>Medicare</td><td class="numeric">$${stub.medicare}</td><td class="numeric">-</td></tr>
    <tr><td>Health Insurance</td><td class="numeric">$${stub.healthInsurance}</td><td class="numeric">-</td></tr>
    <tr style="border-top:1px solid #aaa;"><td><strong>Total Deductions</strong></td><td class="numeric"><strong>$${stub.totalDeductions}</strong></td><td class="numeric"><strong>$${stub.ytdDeductions}</strong></td></tr>
    </tbody></table>
    <div class="net-pay-section">NET PAY: $${stub.netPay}</div>
    <div class="ytd-note">YTD Gross: $${stub.ytdGross} | YTD Deductions: $${stub.ytdDeductions} | YTD Net: $${stub.ytdNet}</div>
    <div style="font-size:9px; text-align:center; margin-top:20px;">Direct Deposit: ${employee.banking?.accountType || 'Checking'} ****${employee.banking?.account?.slice(-4) || '1234'}</div>`;
    html2pdf().set({ margin: 0.5, filename: `Paystub_${stub.payDate}.pdf`, image: { type: 'jpeg', quality: 0.98 }, jsPDF: { unit: 'in', format: 'letter' } }).from(pdfDiv).save();
  }

  // Event binding
  function bindEvents(){
    document.getElementById("doLoginBtn")?.addEventListener("click",()=>{
      const u = document.getElementById("loginUsername").value, p = document.getElementById("loginPassword").value;
      const user = users.find(x=>x.username===u && x.password===p);
      if(user){ currentUser=user; document.getElementById("loginScreen").classList.add("hidden"); document.getElementById("registerScreen").classList.add("hidden"); document.getElementById("dashboardScreen").classList.remove("hidden"); document.getElementById("userNameDisplay").innerText = user.personal?.firstName || user.username; renderDashboard(); }
      else alert("Invalid credentials");
    });
    document.getElementById("gotoRegisterLink")?.addEventListener("click",()=>{ document.getElementById("loginScreen").classList.add("hidden"); document.getElementById("registerScreen").classList.remove("hidden"); });
    document.getElementById("backToLoginLink")?.addEventListener("click",()=>{ document.getElementById("registerScreen").classList.add("hidden"); document.getElementById("loginScreen").classList.remove("hidden"); });
    document.getElementById("doRegisterBtn")?.addEventListener("click",()=>{
      const reg = { firstName:document.getElementById("regFirstName").value, lastName:document.getElementById("regLastName").value, dob:document.getElementById("regDOB").value, ssn:document.getElementById("regSSN").value, email:document.getElementById("regEmail").value, phone:document.getElementById("regPhone").value, address:document.getElementById("regAddress").value, city:document.getElementById("regCity").value, state:document.getElementById("regState").value, zip:document.getElementById("regZip").value, routing:document.getElementById("regRouting").value, account:document.getElementById("regAccount").value, accountType:document.getElementById("regAccountType").value, filingStatus:document.getElementById("regFilingStatus").value, dependents:document.getElementById("regDependents").value, extraWithholding:document.getElementById("regExtraWithholding").value, username:document.getElementById("regUsername").value, password:document.getElementById("regPassword").value, emergencyName:document.getElementById("regEmergencyName").value, emergencyPhone:document.getElementById("regEmergencyPhone").value };
      if(!reg.firstName || !reg.lastName || !reg.username || !reg.password){ alert("Complete required fields"); return; }
      if(registerEmployee(reg)) alert("Registration submitted. Await admin approval.");
      else alert("Username exists");
      document.getElementById("registerScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
    });
    document.getElementById("logoutBtn")?.addEventListener("click",()=>{ currentUser=null; document.getElementById("dashboardScreen").classList.add("hidden"); document.getElementById("loginScreen").classList.remove("hidden"); });
    document.querySelectorAll("#navLinks span").forEach(tab=>{ tab.addEventListener("click",()=>{ document.querySelectorAll("#navLinks span").forEach(t=>t.classList.remove("active")); tab.classList.add("active"); renderDashboard(); }); });
  }
  loadData();
  bindEvents();
</script>
</body>
</html>
